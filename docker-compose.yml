services:
  api:
    build: .
    container_name: persian-rag-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./vector_db:/app/vector_db
      - /mnt/c/Users/user/.cache/huggingface:/root/.cache/huggingface
  streamlit:
    build: .
    container_name: persian-rag-ui
    command: streamlit run app/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api   
      